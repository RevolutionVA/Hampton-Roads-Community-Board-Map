name: Sync LOCATIONS.md

on:
  pull_request:
    paths:
      - 'data/locations.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate LOCATIONS.md
        run: node scripts/generate-markdown.js

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet LOCATIONS.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated LOCATIONS.md
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOCATIONS.md
          git commit -m "Auto-regenerate LOCATIONS.md from locations.json"
          git push
