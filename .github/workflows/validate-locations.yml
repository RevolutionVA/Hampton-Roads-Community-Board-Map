name: Validate Locations Data

on:
  pull_request:
    paths:
      - 'data/locations.json'
      - 'LOCATIONS.md'
      - 'scripts/**'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - 'data/locations.json'
      - 'LOCATIONS.md'
      - 'scripts/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate locations
        run: npm run validate
